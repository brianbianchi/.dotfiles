# Mouse
set -g mouse on

# Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No escape delay
set -sg escape-time 0

# Renumber on close
set -g renumber-windows on

# Longer scrollback
set -g history-limit 10000

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Scrollback with PageUp
bind -n PageUp copy-mode -u

# Status bar
set -g status-position top
set -g status-left " #S "
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[noreverse] ,} %H:%M "
set -g status-left-length 40
set -g status-right-length 60

# Status bar style
set -g status-style "bg=default,fg=#888888"
set -g window-status-current-style "fg=#ffffff,bold"
set -g window-status-style "fg=#555555"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
